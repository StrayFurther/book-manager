graphql.client.url=http://localhost:8080/graphql
graphql.client.admin-secret=test-secret
spring.mvc.servlet.path=/api

spring.datasource.url=jdbc:h2:mem:bookmanager-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
