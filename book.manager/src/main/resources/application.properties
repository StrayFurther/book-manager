spring.application.name=book.manager
spring.mvc.servlet.path=/api
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8443
logging.level.org.springframework.boot.context.config=DEBUG
spring.h2.console.enabled=false
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
app.base.url=https://localhost:8082
app.frontend.url=http://localhost:4201
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.datasource.url=jdbc:postgresql://db:5432/bookdb
spring.datasource.username=bookuser
spring.datasource.password=somePassword123-
graphql.client.url=http://graphql:8080/v1/graphql
graphql.client.admin-secret=strong-Secret-123
spring.graphql.path=/v1/graphql
server.error.include-stacktrace=always
logging.level.org.springframework.web=DEBUG
spring.mvc.servlet.path=/api