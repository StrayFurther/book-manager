spring.application.name=book.manager
spring.mvc.servlet.path=/api
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8443
logging.level.org.springframework.boot.context.config=DEBUG
spring.h2.console.enabled=false
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
app.base.url=https://localhost:8082
app.frontend.url=http://localhost:4201
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.datasource.username=ttuser
spring.datasource.password=!1%TTUser
graphql.client.url=http://localhost:8082/graphql
graphql.client.admin-secret=someSecret123--