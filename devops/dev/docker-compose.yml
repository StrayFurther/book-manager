version: "3.8"

services:
  db:
    image: postgres:15
    container_name: bookmanager_db
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: somePassword123-
      POSTGRES_DB: bookdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped

  graphql:
    image: hasura/graphql-engine:latest
    container_name: bookmanager_graphql
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://bookuser:somePassword123-@db:5432/bookdb"
      HASURA_GRAPHQL_ADMIN_SECRET: "strong-Secret-123"
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
    depends_on:
      - db

  backend:
    build:
      context: ../../book.manager
      dockerfile: ../devops/dev/Dockerfile
    container_name: bookmanager_backend
    profiles: ["backend"]    # optional — prevents building by default
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/bookdb"
      SPRING_DATASOURCE_USERNAME: "bookuser"
      SPRING_DATASOURCE_PASSWORD: "somePassword123-"
      GRAPHQL_CLIENT_URL: "http://graphql:8080/v1/graphql"
      GRAPHQL_CLIENT_ADMIN_SECRET: "strong-Secret-123"
      SPRING_GRAPHQL_PATH: "/v1/graphql"
      SPRING_MVC_SERVLET_PATH: "/api"
      SPRING_WEB_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:4201"
    depends_on:
      - db
      - graphql

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: bookmanager_frontend
