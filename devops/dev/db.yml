version: '3.8'
services:
  db:
    image: postgres:14-alpine
    container_name: graphql-engine-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./devops/dev/db/init:/docker-entrypoint-initdb.d:ro   # seed SQL runs only if volume empty
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres -h 0.0.0.0"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  graphql:
    image: hasura/graphql-engine:latest
    container_name: graphql-engine
    restart: unless-stopped
    ports:
      - "8081:8080"
    url: http://graphql:8080/v1/graphql   # use "http://localhost:8081/v1/graphql" if Spring runs on host
    admin-secret: "secretPassword123-"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "postgres://postgres:postgres@db:5432/postgres"
      HASURA_GRAPHQL_ADMIN_SECRET: "secretPassword123-"
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
    depends_on:
      - db
    networks:
      - backend
volumes:
  db_data: {}

networks:
  backend: {}